{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-upload me-2"></i>Upload Medical Record</h2>
    <a href="{% url 'patient_records' patient.pk %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="card">
    <div class="card-body p-4">
        <div class="alert alert-info mb-4">
            <i class="bi bi-person-fill me-2"></i>
            Uploading record for <strong>{{ patient.full_name }}</strong>
        </div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Record Title</label>
                    <input type="text" name="title" class="form-control"
                           placeholder="e.g. Blood Test Results" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">File</label>
                    <input type="file" name="file" class="form-control"
                           accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" required>
                    <small class="text-muted">
                        Accepted: PDF, JPG, PNG, DOC, DOCX
                    </small>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control"
                              rows="3"
                              placeholder="Optional notes about this record...">
                    </textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-upload me-1"></i> Upload Record
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
