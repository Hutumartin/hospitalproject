{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-calendar-plus me-2"></i>Add Appointment</h2>
    <a href="{% url 'appointment_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>
<div class="card">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Patient</label>
                    <select name="patient_id" class="form-select" required>
                        <option value="">-- Select Patient --</option>
                        {% for patient in patients %}
                        <option value="{{ patient.pk }}">{{ patient.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Doctor</label>
                    <select name="doctor_id" class="form-select">
                        <option value="">-- Select Doctor --</option>
                        {% for doctor in doctors %}
                        <option value="{{ doctor.pk }}">{{ doctor.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Appointment Date</label>
                    <input type="datetime-local" name="appointment_date" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Status</label>
                    <select name="status" class="form-select">
                        <option value="scheduled">Scheduled</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Notes</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i> Save Appointment
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
