{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pencil-square me-2"></i>Edit Bill</h2>
    <a href="{% url 'billing_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>
<div class="card">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Patient</label>
                    <select name="patient_id" class="form-select">
                        {% for patient in patients %}
                        <option value="{{ patient.pk }}" {% if billing.patient.pk == patient.pk %}selected{% endif %}>
                            {{ patient.full_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Appointment</label>
                    <select name="appointment_id" class="form-select">
                        <option value="">-- None --</option>
                        {% for appointment in appointments %}
                        <option value="{{ appointment.pk }}" {% if billing.appointment.pk == appointment.pk %}selected{% endif %}>
                            {{ appointment.patient }} - {{ appointment.appointment_date|date:'d M Y' }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Amount (KES)</label>
                    <input type="number" name="amount" class="form-control" step="0.01" value="{{ billing.amount }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Status</label>
                    <select name="status" class="form-select">
                        <option value="unpaid" {% if billing.status == 'unpaid' %}selected{% endif %}>Unpaid</option>
                        <option value="paid" {% if billing.status == 'paid' %}selected{% endif %}>Paid</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i> Update Bill
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
