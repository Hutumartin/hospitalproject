<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS — Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signup-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 440px;
        }
        .signup-header {
            background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
        }
        .signup-body { padding: 30px; }
        .btn-signup {
            background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
            border: none;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn-signup:hover { opacity: 0.9; color: white; }
        .divider {
            text-align: center;
            margin: 15px 0;
            color: #6c757d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="signup-card card">
    <div class="signup-header">
        <i class="bi bi-hospital fs-1"></i>
        <h3 class="mt-2 mb-0">Hospital Management</h3>
        <p class="mb-0 opacity-75">Create your account</p>
    </div>
    <div class="signup-body">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Choose a username" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control"
                           placeholder="Enter your email" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password1" class="form-control"
                           placeholder="Create a password" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password2" class="form-control"
                           placeholder="Repeat your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-signup">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>
        <div class="divider">Already have an account?</div>
        <a href="{% url 'login' %}" class="btn btn-outline-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
